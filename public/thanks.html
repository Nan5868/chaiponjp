<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送信完了 — ご招待のご案内</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Mincho ProN', 'Georgia', serif;
    background: linear-gradient(135deg, #1a0e08 0%, #3d2314 50%, #1a0e08 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fefcf8;
    border-radius: 20px;
    max-width: 480px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    text-align: center;
    padding: 56px 40px;
  }
  .icon { font-size: 64px; margin-bottom: 24px; animation: pop 0.5s ease; }
  @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  h1 { font-size: 24px; color: #4a2c12; letter-spacing: 3px; font-weight: normal; margin-bottom: 20px; }
  .divider { color: #c9a96e; letter-spacing: 8px; margin: 12px 0; }
  p { font-size: 14px; color: #6a5040; line-height: 2; font-family: 'Hiragino Sans', sans-serif; }
  .note {
    margin-top: 28px;
    background: #fdf5e8;
    border-left: 3px solid #c9a96e;
    padding: 14px 18px;
    border-radius: 0 10px 10px 0;
    text-align: left;
    font-size: 13px;
    color: #7a5535;
    line-height: 1.9;
    font-family: 'Hiragino Sans', sans-serif;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✉️</div>
  <div class="divider">✦ ✦ ✦</div>
  <h1>送信が完了しました</h1>
  <div class="divider">✦ ✦ ✦</div>
  <p>
    ご回答いただき、ありがとうございます。<br>
    内容を確認のうえ、改めてご連絡いたします。
  </p>
  <div class="note">
    📬 ご予約が確定しましたら、メールにてお知らせいたします。<br>
    お返事まで少々お時間をいただく場合がございます。<br>
    どうぞよろしくお願いいたします。
  </div>
</div>
</body>
</html>
